<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Indicator</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Updated to a creamish/beige background */
            background: #000000; 
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .page {
            background: #ffffff;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            padding: 2rem 2rem 1.75rem;
            width: 100%;
            max-width: 750px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.75rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #ede9fe;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: #6d28d9;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }

        .header-text h1 {
            font-size: 15px;
            font-weight: 600;
            color: #0f172a;
            line-height: 1.3;
        }

        .header-text p {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 2px;
        }

        .field {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 12.5px;
            color: #64748b;
            margin-bottom: 5px;
            font-weight: 500;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            color: #1e293b;
            font-size: 13.5px;
            font-family: inherit;
            appearance: none;
            -webkit-appearance: none;
            transition: border-color 0.15s;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #a5b4fc;
            background: #ffffff;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .submit-btn {
            width: 100%;
            padding: 10px;
            background: #1e293b;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.25rem;
            font-family: inherit;
            letter-spacing: 0.2px;
            transition: opacity 0.15s;
        }

        .submit-btn:hover { opacity: 0.85; }

        .result-box {
            margin-top: 1.25rem;
            padding: 1.1rem 1.25rem;
            background: #f8fafc;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .result-box .label {
            font-size: 11.5px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 4px;
        }

        .result-box .score {
            font-size: 36px;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.1;
        }

        .result-box .sub {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 3px;
        }

        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid #f1f5f9;
            flex-wrap: wrap;
        }

        .footer a {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.15s;
        }

        .footer a:hover { color: #475569; }

        .footer svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="page">

        <div class="header">
            <div class="avatar">PSR</div>
            <div class="header-text">
                <h1>Student performance indicator</h1>
                <p>Predict math score from demographic &amp; academic features</p>
            </div>
        </div>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <div class="row">
                <div class="field">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="" disabled selected>Select</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="field">
                    <label>Race / ethnicity</label>
                    <select name="race_ethnicity" required>
                        <option value="" disabled selected>Select</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label>Parental level of education</label>
                <select name="parental_level_of_education" required>
                    <option value="" disabled selected>Select</option>
                    <option value="associate's degree">Associate's degree</option>
                    <option value="bachelor's degree">Bachelor's degree</option>
                    <option value="high school">High school</option>
                    <option value="master's degree">Master's degree</option>
                    <option value="some college">Some college</option>
                    <option value="some high school">Some high school</option>
                </select>
            </div>

            <div class="row">
                <div class="field">
                    <label>Lunch type</label>
                    <select name="lunch" required>
                        <option value="" disabled selected>Select</option>
                        <option value="free/reduced">Free / reduced</option>
                        <option value="standard">Standard</option>
                    </select>
                </div>
                <div class="field">
                    <label>Test preparation</label>
                    <select name="test_preparation_course" required>
                        <option value="" disabled selected>Select</option>
                        <option value="none">None</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label>Reading score (0–100)</label>
                    <input type="number" name="reading_score" placeholder="e.g. 72" min="0" max="100" required />
                </div>
                <div class="field">
                    <label>Writing score (0–100)</label>
                    <input type="number" name="writing_score" placeholder="e.g. 68" min="0" max="100" required />
                </div>
            </div>

            <button type="submit" class="submit-btn">Predict math score</button>

        </form>

        {% if results %}
        <div class="result-box">
            <div class="label">Predicted math score</div>
            <div class="score">{{ results | round(1) }}</div>
            <div class="sub">out of 100</div>
        </div>
        {% endif %}

        <div class="footer">
            <a href="https://github.com/Pankaj-Singh-Rawat/Student_Performance_Prediction" target="_blank">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.167 6.839 9.49.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.34-3.369-1.34-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.607.069-.607 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                </svg>
                GitHub
            </a>
            <a href="mailto:pankaj.psrawat@gmail.com">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M2 7l10 7 10-7"/>
                </svg>
                Email
            </a>
        </div>

    </div>
</body>
</html>
